[build]
     command = "npm run build"
     publish = "dist"

   [[redirects]]
     from = "/api/*"
     to = "/.netlify/functions/:splat"
     status = 200

   [[redirects]]
     from = "/*"
     to = "/index.html"
     status = 200

   [[scheduled-functions]]
     function = "osrs-news-cache"
     schedule = "*/1 * * * *"

   [[scheduled-functions]]
     function = "jmod-comments-cache"
     schedule = "*/1 * * * *"
